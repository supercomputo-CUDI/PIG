[project]
site_name = "Documentación de prueba para PIG"
site_url = "https://supercomputo-cudi.github.io/PIG"
repo_url = "https://github.com/supercomputo-CUDI/PIG"
repo_name = "CUDI/PIG"

nav = [
    {"Principal" = "index.md"},
    { "Acceso al cluster de PIG" = [
        "cluster_access/01_linux.md",
        "cluster_access/02_windows.md",
        "cluster_access/03_my_fist_pod.md"
    ]},
    {"Agregar nodo a PIG" = [
         "worker_node/01_init_ubuntu.md",
	 "worker_node/02_init_alma.md"
	 ]}
]

extra_css = ["stylesheets/extra.css"] # Custom colors

[project.theme]
font.text = "Merriweather Sans"
font.code = "JetBrains Mono"
language = "es"
logo = "assets/images/minilogo_pig.png"
favicon = "assets/images/favicon_pig.png"
custom_dir = "docs/overrides"

# --- Light Mode Palette ---
[[project.theme.palette]]
media = "(prefers-color-scheme: light)"
scheme = "default"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

# --- Dark Mode (Slate) Palette ---
[[project.theme.palette]]
media = "(prefers-color-scheme: dark)"
scheme = "slate"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"


[project.theme.icon]
repo = "fontawesome/brands/github-alt"